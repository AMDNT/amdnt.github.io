<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日看板 · 简洁版</title>
    <style>
        /* 极简风格 */
        body {
            margin: 0;
            padding: 12px;
            background: #ffffff;
            color: #000000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            line-height: 1.4;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            padding: 0;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid #000;
            padding-left: 8px;
            margin: 0;
        }
        .header {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            margin-bottom: 4px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .countdown-number {
            font-size: 42px;
            text-align: center;
            font-weight: bold;
            margin: 5px 0 0;
        }
        .countdown-label {
            text-align: center;
            font-size: 15px;
            color: #333;
            margin-top: 2px;
        }
        .forecast-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 15px;
        }
        .forecast-item {
            flex: 1;
            text-align: center;
            padding: 5px 0;
        }
        .forecast-icon {
            font-size: 32px;
            line-height: 1.2;
        }
        .forecast-date {
            font-weight: bold;
            font-size: 16px;
            margin: 4px 0 2px;
        }
        .forecast-temp {
            font-size: 16px;
            margin: 2px 0;
        }
        .forecast-desc {
            font-size: 14px;
            color: #555;
            text-transform: capitalize;
        }
        #place-card {
            display: flex;
            flex-direction: column;
            min-height: 140px;
        }
        .place-name {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin: auto 0;
            word-break: break-word;
        }
        .place-desc {
            font-size: 15px;
            color: #333;
            text-align: justify;
            line-height: 1.4;
            margin-top: auto;
            word-break: break-word;
        }
        .todo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .todo-header-buttons {
            display: flex;
            gap: 8px;
        }
        .todo-header-btn {
            font-size: 20px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            background: none;
        }
        .todo-header-btn.clear {
            font-size: 16px;
            width: auto;
            padding: 0 10px;
        }
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 10px 0 0;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 17px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 6px;
        }
        .todo-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .todo-item-text {
            flex: 1;
            word-break: break-word;
        }
        .todo-item-input {
            flex: 1;
            font-size: 17px;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .todo-item-delete {
            font-size: 20px;
            color: #999;
            cursor: pointer;
            padding: 0 6px;
            user-select: none;
        }
        .todo-item-delete:hover { color: #f00; }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
    <!-- 引入外部配置文件（必须与 index.html 同目录） -->
    <script src="config.js"></script>
    <script src="places.js"></script>
</head>
<body>
    <div class="container">
        <div class="header" id="datetime">加载日期...</div>

        <!-- 两个倒计时并排 -->
        <div class="row-2">
            <div class="card">
                <div class="card-title" id="countdown1-title">⏳ 倒计时1</div>
                <div class="countdown-number" id="countdown1">--</div>
                <div class="countdown-label">天</div>
            </div>
            <div class="card">
                <div class="card-title" id="countdown2-title">⏳ 倒计时2</div>
                <div class="countdown-number" id="countdown2">--</div>
                <div class="countdown-label">天</div>
            </div>
        </div>

        <!-- 未来天气横排 -->
        <div class="card">
            <div class="card-title">🌤️ 未来天气</div>
            <div id="forecast" class="forecast-row">加载天气...</div>
        </div>

        <!-- 地名 + 待办 并排 -->
        <div class="row-2">
            <!-- 左侧：南京地名卡片 -->
            <div class="card">
                <div class="card-title">🏯 南京地名</div>
                <div id="place-card">
                    <div id="place-name" class="place-name">“冶城”</div>
                    <div id="place-desc" class="place-desc">公元前495年，吴王夫差在今朝天宫后山设冶铸作坊，南京最早的城邑雏形。</div>
                </div>
            </div>
            <!-- 右侧：动态待办卡片 -->
            <div class="card">
                <div class="todo-header">
                    <div class="card-title">✅ 待办事项</div>
                    <div class="todo-header-buttons">
                        <div id="todoAddBtn" class="todo-header-btn">+</div>
                        <div id="todoClearBtn" class="todo-header-btn clear">清空</div>
                    </div>
                </div>
                <ul class="todo-list" id="todoList"></ul>
            </div>
        </div>

        <div class="footer"></div>
    </div>

    <script>
        // 地名
        const placeNameEl = document.getElementById('place-name');
        const placeDescEl = document.getElementById('place-desc');
        function updateNanjingPlace() {
            if (typeof NANJING_PLACES !== 'undefined' && NANJING_PLACES.length) {
                const place = NANJING_PLACES[Math.floor(Math.random() * NANJING_PLACES.length)];
                placeNameEl.textContent = `“${place.name}”`;
                placeDescEl.textContent = place.desc;
            }
        }

        // 日期时间（含秒）
        const datetimeEl = document.getElementById('datetime');
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            datetimeEl.textContent = `${year}年${month}月${day}日 ${weekday} ${hours}:${minutes}:${seconds}`;
        }

        // 倒计时
        const countdown1El = document.getElementById('countdown1');
        const countdown2El = document.getElementById('countdown2');
        const countdown1Title = document.getElementById('countdown1-title');
        const countdown2Title = document.getElementById('countdown2-title');

        function setCountdownTitles() {
            if (typeof COUNTDOWNS !== 'undefined' && COUNTDOWNS?.length >= 2) {
                countdown1Title.textContent = `⏳ ${COUNTDOWNS[0].name}`;
                countdown2Title.textContent = `⏳ ${COUNTDOWNS[1].name}`;
            }
        }
        function daysUntil(targetYear, targetMonth, targetDay) {
            if (!targetYear || !targetMonth || !targetDay) return 0;
            const target = new Date(targetYear, targetMonth - 1, targetDay);
            target.setHours(0, 0, 0, 0);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const diff = target - now;
            return diff >= 0 ? Math.floor(diff / (1000 * 60 * 60 * 24)) : 0;
        }
        function updateCountdowns() {
            if (typeof COUNTDOWNS !== 'undefined' && COUNTDOWNS?.length >= 2) {
                countdown1El.textContent = daysUntil(COUNTDOWNS[0].year, COUNTDOWNS[0].month, COUNTDOWNS[0].day);
                countdown2El.textContent = daysUntil(COUNTDOWNS[1].year, COUNTDOWNS[1].month, COUNTDOWNS[1].day);
            }
        }

        // 天气（模拟）
        const forecastEl = document.getElementById('forecast');
        function fetchForecast() {
            if (typeof WEATHER_CONFIG === 'undefined' || !WEATHER_CONFIG.apiKey) {
                const mock = [
                    { date: '4月12日', temp: '18°C / 10°C', desc: '晴', icon: '☀️' },
                    { date: '4月13日', temp: '20°C / 12°C', desc: '多云', icon: '☁️' },
                    { date: '4月14日', temp: '17°C / 11°C', desc: '小雨', icon: '🌧️' }
                ];
                renderForecast(mock);
            } else {
                // 如果有 API Key 可以加上真实请求，这里省略
                renderForecast([]);
            }
        }
        function renderForecast(list) {
            if (list.length === 0) {
                forecastEl.innerHTML = '<div class="forecast-item">暂无天气数据</div>';
                return;
            }
            let html = '';
            list.forEach(day => {
                html += `
                    <div class="forecast-item">
                        <div class="forecast-icon">${day.icon}</div>
                        <div class="forecast-date">${day.date}</div>
                        <div class="forecast-temp">${day.temp}</div>
                        <div class="forecast-desc">${day.desc}</div>
                    </div>
                `;
            });
            forecastEl.innerHTML = html;
        }

        // 待办事项管理（简化，与之前相同）
        const todoListEl = document.getElementById('todoList');
        const todoAddBtn = document.getElementById('todoAddBtn');
        const todoClearBtn = document.getElementById('todoClearBtn');
        let todos = JSON.parse(localStorage.getItem('dynamicTodos')) || [];

        function saveTodos() { localStorage.setItem('dynamicTodos', JSON.stringify(todos)); }
        function renderTodos() {
            if (!todoListEl) return;
            let html = '';
            todos.forEach(todo => {
                html += `
                    <li class="todo-item" data-id="${todo.id}">
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id}, this.checked)">
                        <span class="todo-item-text">${todo.text.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c])}</span>
                        <span class="todo-item-delete" onclick="deleteTodo(${todo.id})">✕</span>
                    </li>
                `;
            });
            todoListEl.innerHTML = html;
        }
        window.toggleTodo = (id, checked) => {
            const todo = todos.find(t => t.id === id);
            if (todo) { todo.completed = checked; saveTodos(); renderTodos(); }
        };
        window.deleteTodo = (id) => {
            todos = todos.filter(t => t.id !== id);
            saveTodos(); renderTodos();
        };
        function addTodo() {
            const text = prompt('请输入待办事项');
            if (text && text.trim()) {
                todos.push({ id: Date.now(), text: text.trim(), completed: false });
                saveTodos(); renderTodos();
            }
        }
        function clearTodos() {
            if (confirm('清空所有待办？')) { todos = []; saveTodos(); renderTodos(); }
        }
        todoAddBtn.addEventListener('click', addTodo);
        todoClearBtn.addEventListener('click', clearTodos);
        renderTodos();

        // 初始化
        function init() {
            updateDateTime();
            setInterval(updateDateTime, 1000);  // 每秒更新时间

            setCountdownTitles();
            updateCountdowns();
            setInterval(updateCountdowns, 60000); // 每分钟更新倒计时

            fetchForecast();
            updateNanjingPlace();
        }
        init();
    </script>
</body>
</html>
